<svg viewBox="20 10 60 70" xmlns="http://www.w3.org/2000/svg" id="wqs_logo_immortal">
  <defs>
    <style>
      /* 统一声明基础端点圆润规范，彻底剥离可能被拦截的 CSS 变量 */
      .st-line-base { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .st-s-base    { fill: none; stroke-linecap: round; }
      
      /* ⚪ 底层全包围物理白盾：强行加粗，形成纯物理的硬质外边框 */
      .wqs-bg-shell { stroke: #ffffff; stroke-width: 10.2; }
      .wqs-bg-w     { stroke: #ffffff; stroke-width: 9.2;  }
      .wqs-bg-s     { stroke: #ffffff; stroke-width: 8.6;  }
      .wqs-bg-drop  { fill: #ffffff;   stroke: #ffffff; stroke-width: 5.0; stroke-linejoin: round; }

      /* ⚫ 顶层核心主体：保持你最完美的优雅深灰与标准视觉权重 */
      .wqs-fg-shell { stroke: #1a1a1a; stroke-width: 5.2; }
      .wqs-fg-w     { stroke: #1a1a1a; stroke-width: 4.2; }
      .wqs-fg-s     { stroke: #1a1a1a; stroke-width: 3.6; }
      .wqs-fg-drop  { fill: #1a1a1a;   stroke: none; }
    </style>
  </defs>

  <g transform="translate(4, 3.6) scale(0.92)">
    
    <g class="st-line-base">
      <path class="wqs-bg-shell" d="M50,28 C43,28 32,40 32,54 C32,67 41,71 50,71 C54.5,71 58.5,69.5 61.5,67.5 C65.5,64.5 68,60 68,54 C68,40 57,28 50,28" />
      <path class="wqs-bg-w"     d="M37,21.5 L43.5,25.5 L50,20.5 L56.5,25.5 L63,21.5" />
      <path class="wqs-bg-s st-s-base" d="M50,32 C43,38 43,47 50,50 C57,53 57,62 50,68" />
    </g>
    <path class="wqs-bg-drop"    d="M60.5,59 C62.5,57 67.5,59 70.5,63 C72.5,66.5 71,69 68.5,70 C65.5,71 62,69 61.5,65 C61,63 60.5,59 60.5,59 Z" />

    <g class="st-line-base">
